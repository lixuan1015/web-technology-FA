<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Items – Campus Lost & Found</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="home.html" class="btn-back">← Back to Home</a>

<div class="page-header">
  <span class="icon">🔦</span>
  <h1>Lost <span>Items</span></h1>
  <p>Browse items reported as lost on campus</p>
</div>

<div class="list-container">
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍  Search by title or location..." oninput="filterItems()">
  </div>
  <div class="items-grid" id="itemsGrid"></div>
</div>

<script>
  const userId = localStorage.getItem("userId");
  if (!userId) { alert("Please login first"); window.location.href = "login.html"; }

  let allItems = [];

  fetch('/api/items/lost')
    .then(res => res.json())
    .then(data => { allItems = data; renderItems(allItems); })
    .catch(() => {
      document.getElementById("itemsGrid").innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load items.</p></div>`;
    });

  function renderItems(items) {
    const grid = document.getElementById("itemsGrid");
    if (!items.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No lost items reported yet.</p></div>`;
      return;
    }
    grid.innerHTML = items.map(item => `
      <div class="item-card">
        <div class="item-title">${esc(item.title)}</div>
        <span class="status-badge ${item.status === 'Active' ? 'status-active' : 'status-claimed'}">${item.status}</span>
        <div class="item-meta">
          <div class="meta-row"><span>📝</span><span>${esc(item.description)}</span></div>
          <div class="meta-row"><span>📍</span><span>${esc(item.location)}</span></div>
          <div class="meta-row"><span>📅</span><span>${fmtDate(item.date)}</span></div>
          <div class="meta-row"><span>📞</span><span>${esc(item.contact)}</span></div>
        </div>
        <div class="item-actions">
          ${item.user_id == userId ? `<button class="btn btn-danger" onclick="deleteItem(${item.id})">🗑 Delete</button>` : ''}
          ${item.status === 'Active' ? `<button class="btn btn-claim" onclick="claimItem(${item.id})">✅ Claimed</button>` : ''}
        </div>
      </div>`).join('');
  }

  function filterItems() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderItems(allItems.filter(i => i.title.toLowerCase().includes(q) || i.location.toLowerCase().includes(q)));
  }

  async function deleteItem(id) {
    if (!confirm("Delete this item?")) return;
    const res = await fetch('/api/items/' + id, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId })
    });
    if (res.ok) { allItems = allItems.filter(i => i.id !== id); renderItems(allItems); }
    else alert("You can only delete your own items.");
  }

  async function claimItem(id) {
    if (!confirm("Mark this item as Claimed?")) return;
    const res = await fetch('/api/items/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: "Claimed" })
    });
    if (res.ok) { allItems = allItems.map(i => i.id === id ? { ...i, status: 'Claimed' } : i); renderItems(allItems); }
  }

  function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-MY', { day:'numeric', month:'short', year:'numeric' }) : ''; }
</script>
</body>
</html>
