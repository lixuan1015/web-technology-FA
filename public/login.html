<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Campus Lost & Found</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-header">
  <span class="icon">🎒</span>
  <h1>Campus <span>Lost & Found</span></h1>
  <p>Sign in to your student account</p>
</div>

<div class="card">
  <form id="loginForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="student@university.edu" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn btn-primary">Sign In →</button>
  </form>
  <div class="auth-footer">
    New student? <a href="signup.html">Create an account</a>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
