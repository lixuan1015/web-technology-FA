<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – Campus Lost & Found</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-header">
  <span class="icon">📝</span>
  <h1>Join <span>the Community</span></h1>
  <p>Create your student account</p>
</div>

<div class="card">
  <form id="signupForm">
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="student@university.edu" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary">Create Account →</button>
  </form>
  <div class="auth-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
